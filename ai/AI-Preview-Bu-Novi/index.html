<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0815" />
  <meta name="robots" content="noindex, nofollow" />
  <title>AI Creative Media Private Preview | Mozaiq Future Academy</title>
  
  <link rel="icon" type="image/png" sizes="32x32" href="../../assets/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../../assets/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../../assets/images/apple-touch-icon.png" />
  
  <link rel="stylesheet" href="../../assets/css/style.css" />
  <link rel="stylesheet" href="../ai.css" />
  <link rel="stylesheet" href="presentation.css" />
  
  <!-- Accessibility hidden instruction -->
  <div class="sr-only">Gunakan tombol panah kiri dan kanan untuk berpindah slide.</div>
</head>
<body class="presentation-mode">
  
  <div class="presentation-container">
    <div class="slide-area" id="slide-area">
      <!-- Presentation is scaled inside this wrapper -->
      <main class="slide-scaler" id="slide-scaler" aria-live="polite">
        <!-- Slides will be injected here via JS -->
      </main>

      <!-- Floating Controls -->
      <div class="presentation-controls" aria-label="Presentation controls">
        <button type="button" class="control-btn" id="btn-fullscreen" aria-label="Toggle Fullscreen" title="Fullscreen (F)">
          <i data-lucide="maximize" class="icon" aria-hidden="true"></i>
        </button>
        <button type="button" class="control-btn" id="btn-prev" aria-label="Previous Slide" title="Previous (Left Arrow)">
          <i data-lucide="chevron-left" class="icon" aria-hidden="true"></i>
        </button>
        <div class="slide-indicator" id="slide-indicator" aria-live="polite">1 / 10</div>
        <button type="button" class="control-btn" id="btn-next" aria-label="Next Slide" title="Next (Right Arrow)">
          <i data-lucide="chevron-right" class="icon" aria-hidden="true"></i>
        </button>
        <a href="../" class="control-btn" aria-label="Back to Program Page" title="Back to /ai">
          <i data-lucide="x" class="icon" aria-hidden="true"></i>
        </a>
      </div>
    </div>

    <!-- Presenter Notes Sidebar -->
    <aside class="presenter-notes-panel" id="presenter-panel" aria-label="Presenter Notes">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h3 style="margin: 0; color: var(--accent-cyan); font-size: 16px;">Catatan Presenter</h3>
        <button class="btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="window.print()">
          <i data-lucide="printer" class="icon" style="width: 14px; height: 14px;"></i> Cetak
        </button>
      </div>
      <div id="presenter-note-content" style="font-size: 18px; line-height: 1.6; color: rgba(255,255,255,0.9); flex: 1;">
        <!-- Notes injected here -->
      </div>
      <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; margin-top: 24px;">
        <span style="font-size: 12px; color: rgba(255,255,255,0.5);">PREVIEW SLIDE SELANJUTNYA</span>
        <div id="next-slide-preview" style="font-weight: 600; margin-top: 4px; color: #fff;"></div>
      </div>
    </aside>
  </div>

  <!-- Toast for copying prompt -->
  <div class="toast" id="toast-message" aria-live="polite">Prompt berhasil disalin</div>

  <script src="../../assets/js/icons.js"></script>
  <script type="module" src="presentation.js"></script>
</body>
</html>
